name: RAG Regression Pipeline

on: 
    push:
        branches: ["mm_rag"]
    pull_request:
        branches: ["mm_rag"]

jobs:
    tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.9"

            - name: Install dependencies
              run: |
                python -m pip install --upgare pip
                pip install -r requirements.txt

            - name: Run tests
            env:
                PYTHONPATH: .
            run: pytest -v

            
             
                

