name: Multi-Modal-RAG Regression

on:
  push:
    branches: ["mm_rag"]
    paths:
      - "multi-modal-rag/**"
      - ".github/workflows/regression.yml"
  pull_request:
    branches: ["mm_rag"]
    paths:
      - "multi-modal-rag/**"
      - ".github/workflows/regression.yml"
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: multi-modal-rag

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest -v tests